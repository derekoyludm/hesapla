<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sıralı Satış Fiyatı Hesaplama</title>

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:470px;
    background:#ffffff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.input-group{margin-bottom:18px;width:100%;}

label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
    font-weight:700;
    color:#3d4f66;
}

.field-container{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
}

.field-container input[type="text"]{
    width:100%;
    min-width:0;
}

input[type="text"]{
    flex:1;
    height:46px;
    border:2px solid #bfc6cd;
    border-radius:8px;
    background:#fff;
    padding:0 14px;
    font-size:16px;
    text-align:center;
}

input[type="text"]:focus{
    outline:none;
    border-color:#57c785;
}

.yellow-bg{background:#f7eb75 !important;}
.pink-bg{background:#ffd6e8 !important;}

.clear-btn{
    width:40px;
    height:46px;
    background:#3498db;
    border-radius:8px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
}

button{
    width:100%;
    height:50px;
    border:none;
    border-radius:8px;
    background:#2ecc71;
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
}

.result{display:none;margin-top:20px;}

</style>
</head>

<body>

<div class="container">

<div class="input-group">
<label>Toplam Brüt Giriş Tutarı</label>
<div class="field-container">
<input type="text" id="brut" inputmode="decimal" pattern="[0-9.,]*">
<div class="clear-btn" onclick="temizleKutu('brut')">×</div>
</div>
</div>

<div class="input-group">
<label>Ürün Miktarı</label>
<div class="field-container">
<input type="text" id="miktar" inputmode="decimal" pattern="[0-9.,]*">
<div class="clear-btn" onclick="temizleKutu('miktar')">×</div>
</div>
</div>

<div class="input-group">
<label>2. Ürün Miktarı</label>
<div class="field-container">
<input type="text" id="miktar2" class="yellow-bg" inputmode="decimal" pattern="[0-9.,]*">
<div class="clear-btn" onclick="temizleKutu('miktar2')">×</div>
</div>
</div>

<div class="input-group">
<label>İskonto 1 (%)</label>
<div class="field-container">
<input type="text" id="isk1" inputmode="decimal" pattern="[0-9.,]*">
<div class="clear-btn" onclick="temizleKutu('isk1')">×</div>
</div>
</div>

<div class="input-group">
<label>İskonto 2 (%)</label>
<div class="field-container">
<input type="text" id="isk2" inputmode="decimal" pattern="[0-9.,]*">
<div class="clear-btn" onclick="temizleKutu('isk2')">×</div>
</div>
</div>

<div class="input-group">
<label>İskonto 3 (%)</label>
<div class="field-container">
<input type="text" id="isk3" inputmode="decimal" pattern="[0-9.,]*">
<div class="clear-btn" onclick="temizleKutu('isk3')">×</div>
</div>
</div>

<div class="input-group">
<label>İskonto 4 (%)</label>
<div class="field-container">
<input type="text" id="isk4" inputmode="decimal" pattern="[0-9.,]*">
<div class="clear-btn" onclick="temizleKutu('isk4')">×</div>
</div>
</div>

<div class="input-group">
<label>Satış Kutu Miktarı</label>
<div class="field-container">
<input type="text" id="kutuMiktar" class="pink-bg" inputmode="decimal" pattern="[0-9.,]*">
<div class="clear-btn" onclick="temizleKutu('kutuMiktar')">×</div>
</div>
</div>

<div class="input-group">
<label>Satış Kutu İsk. (%)</label>
<div class="field-container">
<input type="text" id="kutuIskonto" class="pink-bg" inputmode="decimal" pattern="[0-9.,]*">
<div class="clear-btn" onclick="temizleKutu('kutuIskonto')">×</div>
</div>
</div>

<button onclick="hesaplaSatis()">Hesapla</button>

</div>

<script>
function temizleKutu(id){
    document.getElementById(id).value = "";
}

function guvenliSayiyaCevir(id){
    let v = document.getElementById(id).value.trim();
    if(!v) return 0;
    v = v.replace(/\./g,"").replace(",",".");
    return parseFloat(v) || 0;
}

function hesaplaSatis(){
    let brut = guvenliSayiyaCevir("brut");
    let m1 = guvenliSayiyaCevir("miktar");
    let m2 = guvenliSayiyaCevir("miktar2");

    let isk1 = guvenliSayiyaCevir("isk1");
    let isk2 = guvenliSayiyaCevir("isk2");
    let isk3 = guvenliSayiyaCevir("isk3");
    let isk4 = guvenliSayiyaCevir("isk4");

    let ham = (brut/m1)/m2;

    let net = ham*(1-isk1/100)*(1-isk2/100)*(1-isk3/100)*(1-isk4/100);

    alert("Net: " + net.toFixed(2));
}
</script>

</body>
</html>
