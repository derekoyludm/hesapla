        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 19px;
            text-align: center;
            border-bottom: 2px solid #34495e;
            padding-bottom: 10px;
        }
        .row-half {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .input-group {
            margin-bottom: 10px;
            width: 100%;
        }
        label {
            font-size: 13px;
            color: #34495e;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 11px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s;
            text-align: center;
            -webkit-appearance: none;
            background-color: white;
        }
        select {
            text-align-last: center;
            cursor: pointer;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='24' viewBox='0 0 10 24'><path fill='%2334495e' d='M0 9l5 5 5-5H0z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 10px center;
            padding-right: 25px;
        }
        input[type="text"]:focus, select:focus {
            border-color: #2ecc71;
            outline: none;
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.3s;
            margin-top: 15px;
            -webkit-appearance: none;
            touch-action: manipulation;
        }
        button:hover, button:active {
            background-color: #27ae60;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f8f5;
            border-radius: 6px;
            display: none;
        }
        .result p {
            margin: 8px 0;
            font-size: 14px;
            color: #2c3e50;
        }
        .highlight {
            font-weight: bold;
            float: right;
        }
