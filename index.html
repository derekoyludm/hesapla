<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satış Fiyatı Hesaplama</title>

<link rel="icon" type="image/png" sizes="512x512" href="tag-512.png">
<link rel="apple-touch-icon" href="tag-512.png">

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    padding:20px;
    background:#eef2f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:470px;
    background:#fff;
    border-radius:18px;
    padding:26px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.input-group{ margin-bottom:18px; }

label{
    display:block;
    margin-bottom:6px;
    font-weight:500;
    font-size:13px;
    color:#6b7a90;
}

.field-container{
    display:flex;
    gap:8px;
    align-items:center;
}

input,
select,
button{
    width:100%;
    height:46px;
    border:1.5px solid #c9d2dc;
    border-radius:8px;
    font-size:15px;
    text-align:center;
    background:#fff;
    transition:.15s;
}

select{
    -webkit-appearance:none;
    -moz-appearance:none;
    appearance:none;
    cursor:pointer;
}

input:focus,
select:focus{
    outline:none;
    border-color:#8fd4ae;
    box-shadow:0 0 0 4px rgba(143,212,174,0.35);
}

.main-btn{
    flex:1;
    font-weight:600;
    cursor:pointer;
}

.reset-btn{
    width:46px;
    min-width:46px;
    cursor:pointer;
}

.reset-btn:focus,
.reset-btn:active,
.reset-btn.active-reset{
    border-color:#e74c3c;
    box-shadow:0 0 0 4px rgba(231,76,60,0.35);
}

.clear-btn{
    width:40px;
    height:46px;
    background:#3498db;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.row{ display:flex; gap:10px; }
.row .input-group{ flex:1; }

.button-row{ display:flex; gap:10px; margin-top:10px; }

.result{ display:none; margin-top:20px; background:#f7fbf9; padding:15px; border-radius:10px; }

.highlight{ float:right; font-weight:600; }

.box{
    margin-top:12px;
    padding:10px;
    background:#eaf7ef;
    border:2px solid #b7eac8;
    border-left:5px solid #2ecc71;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<div class="input-group">
<label>Birim Fiyat</label>
<div class="field-container">
<input id="brut" type="tel">
<div class="clear-btn" onclick="temizle(event,'brut')">×</div>
</div>
</div>

<div class="input-group">
<label>Miktar</label>
<div class="field-container">
<input id="miktar" type="tel">
<div class="clear-btn" onclick="temizle(event,'miktar')">×</div>
</div>
</div>

<div class="input-group">
<label>2. Miktar</label>
<div class="field-container">
<input id="miktar2" type="tel">
<div class="clear-btn" onclick="temizle(event,'miktar2')">×</div>
</div>
</div>

<div class="row">

<div class="input-group">
<label>İsk 1</label>
<div class="field-container">
<input id="isk1" type="tel">
<div class="clear-btn" onclick="temizle(event,'isk1')">×</div>
</div>
</div>

<div class="input-group">
<label>İsk 2</label>
<div class="field-container">
<input id="isk2" type="tel">
<div class="clear-btn" onclick="temizle(event,'isk2')">×</div>
</div>
</div>

</div>

<div class="row">

<div class="input-group">
<label>İsk 3</label>
<div class="field-container">
<input id="isk3" type="tel">
<div class="clear-btn" onclick="temizle(event,'isk3')">×</div>
</div>
</div>

<div class="input-group">
<label>İsk 4</label>
<div class="field-container">
<input id="isk4" type="tel">
<div class="clear-btn" onclick="temizle(event,'isk4')">×</div>
</div>
</div>

</div>

<div class="row">

<div class="input-group">
<label>Kâr %</label>
<select id="kar">
<option value="25">25</option>
<option value="30">30</option>
<option value="40">40</option>
<option value="50">50</option>
</select>
</div>

<div class="input-group">
<label>KDV %</label>
<select id="kdv">
<option value="20">20</option>
<option value="10">10</option>
<option value="1">1</option>
</select>
</div>

</div>

<div class="row">

<div class="input-group">
<label>Kutu Miktar</label>
<div class="field-container">
<input id="kutuMiktar" type="tel">
<div class="clear-btn" onclick="temizle(event,'kutuMiktar')">×</div>
</div>
</div>

<div class="input-group">
<label>Kutu İskonto %</label>
<select id="kutuIskonto">
<option value="5">%5</option>
<option value="10">%10</option>
<option value="15">%15</option>
</select>
</div>

</div>

<div class="button-row">

<button id="hesaplaBtn" onclick="hesapla()">Hesapla</button>

<button class="reset-btn" onclick="sifirla(event)">↺</button>

</div>

<div class="result" id="sonuc">
<p>Birim Fiyat <span id="ham" class="highlight"></span></p>
<p><b>Net</b> <span id="net" class="highlight"></span></p>
<p><b>Kârlı</b> <span id="karli" class="highlight"></span></p>
<p><b>KDV Dahil</b> <span id="satis" class="highlight"></span></p>
</div>

</div>

<script>

function g(id){
    let v=document.getElementById(id).value.trim();
    if(!v) return 0;
    return parseFloat(v.replace(/\./g,"").replace(/,/g,".")) || 0;
}

function hesapla(){

    let brut=g("brut");
    let m1=g("miktar")||1;
    let m2=g("miktar2")||1;

    let isk1=g("isk1");
    let isk2=g("isk2");
    let isk3=g("isk3");
    let isk4=g("isk4");

    let kar=parseFloat(document.getElementById("kar").value);
    let kdv=parseFloat(document.getElementById("kdv").value);

    let ham=(brut/m1)/m2;

    let net=ham*(1-isk1/100)*(1-isk2/100)*(1-isk3/100)*(1-isk4/100);

    let karli=net*(1+kar/100);
    let satis=karli*(1+kdv/100);

    document.getElementById("ham").innerText=ham.toFixed(2);
    document.getElementById("net").innerText=net.toFixed(2);
    document.getElementById("karli").innerText=karli.toFixed(2);
    document.getElementById("satis").innerText=satis.toFixed(2);

    document.getElementById("sonuc").style.display="block";
}

function sifirla(e){
    e.preventDefault();
    document.querySelectorAll("input").forEach(i=>i.value="");
    document.querySelectorAll("select").forEach(s=>s.selectedIndex=0);
    document.getElementById("sonuc").style.display="none";
}

function temizle(e,id){
    e.preventDefault();
    document.getElementById(id).value="";
    setTimeout(()=>document.getElementById(id).focus(),10);
}

/* 🔥 ENTER NAVİGASYON GERİ GELDİ */
const alanlar=[...document.querySelectorAll("input,select")];

alanlar.forEach((el,i)=>{
    el.addEventListener("keydown",(e)=>{
        if(e.key==="Enter"){
            e.preventDefault();

            let next=alanlar[i+1];

            if(next){
                next.focus();
                if(next.tagName==="INPUT") next.select();
            }else{
                hesapla();
            }
        }
    });
});

</script>

</body>
</html>
