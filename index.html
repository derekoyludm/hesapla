<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sıralı Satış Fiyatı Hesaplayıcı</title>

<style>
body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container{
    background:#fff;
    width:100%;
    max-width:500px;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-top:0;
    color:#2c3e50;
}

.input-group{
    margin-bottom:12px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
    font-size:14px;
}

.field-container{
    display:flex;
    gap:6px;
}

input[type="text"],
select{
    flex:1;
    height:42px;
    border:2px solid #ccc;
    border-radius:6px;
    padding:0 10px;
    font-size:15px;
    box-sizing:border-box;
    text-align:center;
}

input:focus,
select:focus{
    border-color:#2ecc71;
    outline:none;
}

.clear-btn{
    width:40px;
    height:42px;
    background:#3498db;
    color:white;
    border-radius:6px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    font-size:20px;
    user-select:none;
}

.clear-btn:hover{
    background:#2980b9;
}

.row-half{
    display:flex;
    gap:10px;
}

button{
    width:100%;
    border:none;
    background:#2ecc71;
    color:white;
    padding:14px;
    font-size:16px;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#27ae60;
}

.result{
    display:none;
    margin-top:20px;
    background:#ecfdf5;
    padding:15px;
    border-radius:8px;
}

.result p{
    margin:8px 0;
}

.highlight{
    float:right;
    font-weight:bold;
}

.yellow-bg{
    background:#fff176;
}
</style>
</head>

<body>

<div class="container">

<h2>Sıralı Satış Fiyatı Hesaplama</h2>

<div class="input-group">
<label>Toplam Brüt Giriş Tutarı (KDV Hariç)</label>
<div class="field-container">
<input type="text" id="brut">
<div class="clear-btn" onclick="temizleKutu('brut')">×</div>
</div>
</div>

<div class="input-group">
<label>Ürün Miktarı</label>
<div class="field-container">
<input type="text" id="miktar">
<div class="clear-btn" onclick="temizleKutu('miktar')">×</div>
</div>
</div>

<div class="input-group">
<label>2. Ürün Miktarı</label>
<div class="field-container">
<input type="text" id="miktar2" class="yellow-bg">
<div class="clear-btn" onclick="temizleKutu('miktar2')">×</div>
</div>
</div>

<div class="row-half">

<div class="input-group">
<label>İskonto 1 (%)</label>
<div class="field-container">
<input type="text" id="isk1">
<div class="clear-btn" onclick="temizleKutu('isk1')">×</div>
</div>
</div>

<div class="input-group">
<label>İskonto 2 (%)</label>
<div class="field-container">
<input type="text" id="isk2">
<div class="clear-btn" onclick="temizleKutu('isk2')">×</div>
</div>
</div>

</div>

<div class="row-half">

<div class="input-group">
<label>İskonto 3 (%)</label>
<div class="field-container">
<input type="text" id="isk3">
<div class="clear-btn" onclick="temizleKutu('isk3')">×</div>
</div>
</div>

<div class="input-group">
<label>İskonto 4 (%)</label>
<div class="field-container">
<input type="text" id="isk4">
<div class="clear-btn" onclick="temizleKutu('isk4')">×</div>
</div>
</div>

</div>

<div class="row-half">

<div class="input-group">
<label>Kâr Marjı (%)</label>
<select id="kar">
<option value="10">10</option>
<option value="15">15</option>
<option value="20">20</option>
<option value="25" selected>25</option>
<option value="30">30</option>
<option value="35">35</option>
<option value="50">50</option>
</select>
</div>

<div class="input-group">
<label>KDV (%)</label>
<select id="kdv">
<option value="1">%1</option>
<option value="10">%10</option>
<option value="20" selected>%20</option>
</select>
</div>

</div>

<button onclick="hesaplaSatis()">Satış Fiyatını Hesapla</button>

<div class="result" id="sonucAlani">

<p>
1. Ham Adet Maliyeti:
<span class="highlight" id="resHamMaliyet">0,00 TL</span>
</p>

<p>
2. İskontolu Net Adet Maliyeti:
<span class="highlight" id="resNetMaliyet">0,00 TL</span>
</p>

<p>
Eklenen Kâr Tutarı:
<span class="highlight" id="resKarTutar">0,00 TL</span>
</p>

<p>
3. Kârlı Adet Fiyatı (KDV Hariç):
<span class="highlight" id="resKarliFiyat">0,00 TL</span>
</p>

<p>
KDV Tutarı:
<span class="highlight" id="resKdvTutar">0,00 TL</span>
</p>

<p style="font-size:18px;color:#27ae60;font-weight:bold;">
4. Satış Fiyatı (KDV Dahil):
<span class="highlight" id="resAdetSatis">0,00 TL</span>
</p>

</div>

</div>

<script>

function temizleKutu(id){
    document.getElementById(id).value = "";
}

function guvenliSayiyaCevir(id, tip){

    let value = document.getElementById(id).value.trim();

    if(value === ""){
        return 0;
    }

    if(tip === "tutar"){
        value = value.replace(/\./g, "").replace(",", ".");
    }else{
        value = value.replace(",", ".");
    }

    let sayi = parseFloat(value);

    return isNaN(sayi) ? 0 : sayi;
}

function hesaplaSatis(){

    let brut = guvenliSayiyaCevir("brut","tutar");

    let miktar1 = guvenliSayiyaCevir("miktar","sayi");
    let miktar2 = guvenliSayiyaCevir("miktar2","sayi");

    let isk1 = guvenliSayiyaCevir("isk1","oran");
    let isk2 = guvenliSayiyaCevir("isk2","oran");
    let isk3 = guvenliSayiyaCevir("isk3","oran");
    let isk4 = guvenliSayiyaCevir("isk4","oran");

    let karOran = parseFloat(document.getElementById("kar").value);
    let kdvOran = parseFloat(document.getElementById("kdv").value);

    if(brut <= 0){
        alert("Lütfen geçerli bir tutar giriniz.");
        return;
    }

    if(miktar1 <= 0){
        miktar1 = 1;
    }

    if(miktar2 <= 0){
        miktar2 = 1;
    }

    // Ham maliyet
    let hamAdetMaliyeti = (brut / miktar1) / miktar2;

    // İskontolar
    let netAdetMaliyeti = hamAdetMaliyeti;

    netAdetMaliyeti *= (1 - isk1 / 100);
    netAdetMaliyeti *= (1 - isk2 / 100);
    netAdetMaliyeti *= (1 - isk3 / 100);
    netAdetMaliyeti *= (1 - isk4 / 100);

    // Kar
    let karTutar = netAdetMaliyeti * (karOran / 100);

    let karliAdetFiyati = netAdetMaliyeti + karTutar;

    // KDV
    let kdvTutar = karliAdetFiyati * (kdvOran / 100);

    let satisFiyati = karliAdetFiyati + kdvTutar;

    let fmt = {
        minimumFractionDigits:2,
        maximumFractionDigits:2
    };

    document.getElementById("resHamMaliyet").innerText =
        hamAdetMaliyeti.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resNetMaliyet").innerText =
        netAdetMaliyeti.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resKarTutar").innerText =
        karTutar.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resKarliFiyat").innerText =
        karliAdetFiyati.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resKdvTutar").innerText =
        kdvTutar.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("resAdetSatis").innerText =
        satisFiyati.toLocaleString("tr-TR",fmt) + " TL";

    document.getElementById("sonucAlani").style.display = "block";
}

// ENTER ile hesaplama
document.querySelectorAll("input").forEach(function(input){

    input.addEventListener("keydown",function(e){

        if(e.key === "Enter"){
            e.preventDefault();
            hesaplaSatis();
        }

    });

});

</script>

</body>
</html>
